<!DOCTYPE html>
<html>
<head>
    <title>Food Navigator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🍽 Food Navigator</span>
    </div>
</nav>

<div class="container-fluid bg-success text-white py-5">
    <div class="container text-center">
        <h1 class="display-4">🍽 Food Navigator</h1>
        <p class="lead">Discover nearby food centers through a survey-driven platform.</p>
    </div>
</div>

<div class="container mt-4">
    <!-- Search Form -->
    <form method="GET" class="row g-3 mb-4">
        <div class="col-md-5">
            <input type="text" class="form-control" name="search" placeholder="Search by name, area or food type" value="{{ search_query }}">
        </div>
        <div class="col-md-2">
            <button class="btn btn-success w-100">Search</button>
        </div>
    </form>

    <!-- Food Cards Grid -->
    <div class="row">
        {% for food in foods %}
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <!-- Shop Image -->
                <img src="{{ url_for('static', filename='images/shops images/' + food['shop_image']) }}" 
                     class="card-img-top" style="height:250px; object-fit:cover;" alt="{{ food['name'] }}">
                
                <div class="card-body">
                    <h5>{{ food['name'] }}</h5>
                    <p class="text-muted">📍 {{ food['area'] }}</p>
                    <p class="badge bg-info text-dark">{{ food['food_type'] }}</p>
                    <hr>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success" data-bs-toggle="collapse" data-bs-target="#details{{ loop.index }}">
                            Explore
                        </button>
                        <button class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#menuModal{{ loop.index }}">
                            View Menu
                        </button>
                    </div>
                </div>

                <!-- Collapsible Details -->
                <div class="collapse" id="details{{ loop.index }}">
                    <div class="card-footer bg-white border-top-0">
                        <h6>Quick Info:</h6>
                        <p>Food Type: {{ food['opening_'] }}</p>
                        <a href="https://www.google.com/maps?q={{ food['latitude'] }},{{ food['longitude'] }}" 
                           target="_blank" class="btn btn-sm btn-outline-primary w-100">
                            Get Directions
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Menu (Placed inside loop but outside the card div) -->
        <div class="modal fade" id="menuModal{{ loop.index }}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{ food['name'] }} - Menu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <img src="{{ url_for('static', filename='images/menus/' + food['menu_image']) }}" 
                             class="img-fluid rounded" alt="Menu">
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div> <!-- End Row -->
</div> <!-- End Container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
